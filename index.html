acing: 0.3px; margin-bottom: 6px;\n  }\n  .feature-title {\n    font-size: 14px; font-weight: 500; color: #fff;\n    margin-bottom: 4px;\n  }\n  .feature-desc {\n    font-size: 12px; color: rgba(255,255,255,0.5);\n    line-height: 1.45;\n  }\n\n  /* Footer */\n  .footer {\n    flex-shrink: 0;\n    display: flex; justify-content: space-between; align-items: center;\n    font-size: 12px; color: rgba(255,255,255,0.4);\n    gap: 24px;\n  }\n  .footer .links { display: flex; gap: 24px; }\n  .footer a { color: inherit; text-decoration: none; }\n  .footer a:hover { color: rgba(255,255,255,0.7); }\n\n  /* Subtle ambient accent */\n  .ambient {\n    position: absolute; inset: 0;\n    pointer-events: none; overflow: hidden;\n    z-index: -1;\n  }\n  .ambient::before {\n    content: ''; position: absolute;\n    top: 50%; left: 50%;\n    width: 900px; height: 900px;\n    transform: translate(-50%, -50%);\n    background: radial-gradient(circle, var(--accent, #EA3C2A) 0%, transparent 55%);\n    opacity: 0.06;\n  }\n\n  /* Tweaks */\n  .tweaks {\n    position: fixed; bottom: 24px; right: 24px; z-index: 10000;\n    background: #111; border: 1px solid rgba(255,255,255,0.12);\n    padding: 18px; width: 240px; border-radius: 12px;\n    font-size: 12px; color: #fff; display: none;\n  }\n  .tweaks.active { display: block; }\n  .tweaks h3 { margin: 0 0 14px; font-size: 14px; font-weight: 500; }\n  .tweaks label {\n    display: block; font-size: 11px; color: rgba(255,255,255,0.45);\n    margin: 14px 0 8px;\n  }\n  .tweaks .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }\n  .tweaks .swatch {\n    width: 24px; height: 24px; border-radius: 50%;\n    border: 1.5px solid transparent; cursor: pointer; padding: 0;\n  }\n  .tweaks .swatch.active { border-color: #fff; }\n  .tweaks .opt {\n    flex: 1; padding: 7px 8px; background: transparent;\n    border: 1px solid rgba(255,255,255,0.15); color: #fff;\n    font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 6px;\n  }\n     <div class=\"features\">\n        <div class=\"feature\">\n          <div class=\"feature-label\">01 — ISO<\u002Fdiv>\n          <div class=\"feature-title\">Post a gig<\u002Fdiv>\n          <div class=\"feature-desc\">Fill a spot by tonight.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"feature\">\n          <div class=\"feature-label\">02 — Market<\u002Fdiv>\n          <div class=\"feature-title\">Buy &amp; sell gear<\u002Fdiv>\n          <div class=\"feature-desc\">Local pickup across boroughs.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"feature\">\n          <div class=\"feature-label\">03 — Services<\u002Fdiv>\n          <div class=\"feature-title\">Hire engineers<\u002Fdiv>\n          <div class=\"feature-desc\">Mix, master, record, design.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"feature\">\n          <div class=\"feature-label\">04 — Artists<\u002Fdiv>\n          <div class=\"feature-title\">Meet musicians<\u002Fdiv>\n          <div class=\"feature-desc\">Match by genre and borough.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"main-right\">\n      <div class=\"phone\">\n        <div class=\"notch\"><\u002Fdiv>\n        <div class=\"screen\">\n          <div class=\"screen-label\">SCREENSHOT GOES HERE<\u002Fdiv>\n          <div class=\"screen-sub\">/ 300 × 640<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"indicator\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"footer\">\n    <span>© 2026 Backline — Made in Brooklyn<\u002Fspan>\n    <div class=\"links\">\n      <a href=\"#\">Instagram<\u002Fa>\n      <a href=\"#\">Contact<\u002Fa>\n      <a href=\"#\">Privacy<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"tweaks\" id=\"tweaks\">\n  <h3>Tweaks<\u002Fh3>\n  <label>Accent<\u002Flabel>\n  <div class=\"btn-row\" id=\"accent-row\"><\u002Fdiv>\n  <label>Layout<\u002Flabel>\n  <div class=\"btn-row\" id=\"layout-row\"><\u002Fdiv>\n  <div style=\"margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.35);font-size:11px;line-height:1.5;\">\n    Accent tints details only. Wordmark keeps brand colors.\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accent\": \"red\",\n  \"layout\": \"minimal\"\n}/*EDITMODE-END*/;\n\nconst ACCENTS = {\n  red: '#EA3C2A',\n  blue: '#4A7BE0',\n  yellow: '#F4C84A',\n  green: '#5FAD5C',\n  orange: '#E87A2E',\n  white: '#ffffff',\n};\nconst LAYOUTS = ['default', 'phone-left', 'centered', 'minimal'];\n\nlet tweaks = { ...TWEAK_DEFAULTS };\n\nfunction applyTweaks() {\n  document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent] || ACCENTS.red);\n  document.body.dataset.layout = tweaks.layout;\n  renderTweaks();\n}\n\nfunction setKey(k, v) {\n  tweaks[k] = v;\n  applyTweaks();\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');\n}\n\nfunction renderTweaks() {\n  const a = document.getElementById('accent-row');\n  a.innerHTML = '';\n  Object.entries(ACCENTS).forEach(([k, v]) => {\n    const b = document.createElement('button');\n    b.className = 'swatch' + (tweaks.accent === k ? ' active' : '');\n    b.style.background = v;\n    b.title = k;\n    b.onclick = () => setKey('accent', k);\n    a.appendChild(b);\n  });\n  const l = document.getElementById('layout-row');\n  l.innerHTML = '';\n  LAYOUTS.forEach(opt => {\n    const b = document.createElement('button');\n    b.className = 'opt' + (tweaks.layout === opt ? ' active' : '');\n    b.textContent = opt;\n    b.onclick = () => setKey('layout', opt);\n    l.appendChild(b);\n  });\n}\n\n// Form\ndocument.getElementById('waitlist-form').addEventListener('submit', (e) => {\n  e.preventDefault();\n  const email = document.getElementById('email').value;\n  if (!email.includes('@')) return;\n  const form = e.target;\n  form.classList.add('submitted');\n  document.getElementById('email').value = \"you're in ✓\";\n  document.getElementById('email').disabled = true;\n  document.getElementById('submit-btn').textContent = 'Joined';\n  document.getElementById('submit-btn').disabled = true;\n  document.getElementById('meta').textContent = '848 musicians on the list · iOS only at launch';\n});\n\n// Tweaks host protocol\nwindow.addEventListener('message', (e) => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('active');\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('active');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\napplyTweaks();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

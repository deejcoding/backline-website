<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Backline — Find gigs, gear, and people in NYC</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: "Noto Sans Mono", monospace;
      height: 100%;
    }

    .header {
      position: fixed;
      top: 24px;
      left: 40px;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    
    .logo {
      height: 28px;
      width: auto;
      display: block;
    }

    * { box-sizing: border-box; }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 60px;
      align-items: center;
    }

    h1 {
      font-size: 52px;
      font-weight: 500;
      line-height: 1.05;
      margin-bottom: 16px;
      letter-spacing: -0.03em;
    }

    p {
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      margin-bottom: 24px;
      max-width: 420px;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      max-width: 420px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: white;
      outline: none;
      font-size: 14px;
      font-family: "Noto Sans Mono", monospace;
    }

    button {
      padding: 14px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      background: white;
      color: black;
      font-family: "Noto Sans Mono", monospace;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .meta {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-family: "Noto Sans Mono", monospace;
    }

  .phone {
    width: 280px;
    height: 600px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.15);
    overflow: hidden;
    background: #000;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  
  /* screen container */
  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* key fix */
    object-position: center;
    display: block;
  }

    .submitted input {
      border-color: #5FAD5C;
      color: #5FAD5C;
    }

    .submitted button {
      background: #5FAD5C;
      color: white;
    }

    .footer {
  position: absolute;
  bottom: 24px;
  left: 40px;
  right: 40px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  font-size: 12px;
  color: rgba(255,255,255,0.4);
}

.footer a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  margin-left: 18px;
}

.footer a:hover {
  color: white;
}
    
  </style>
</head>

<body>

<div class="page">
  
  <header class="header">
    <img src="assets/longlogo.png" class="logo" />
  </header>
  
  <div class="container">

    <!-- LEFT SIDE -->

    
    <div>
      
      <h1>Find gigs, gear, and people in NYC</h1>

      <p>
        A trusted community hub for people in independent music. So we can all link and build. 
      </p>

      <form id="waitlist-form" class="form">
        <input id="email" type="email" placeholder="your@email.com" required />
        <button id="submit-btn">Join waitlist</button>
      </form>

      <div class="meta" id="meta">
        847 musicians on the list · iOS only at launch
      </div>
    </div>

    <!-- RIGHT SIDE (SCREENSHOT) -->
    <div class="phone">
      <img src="assets/screenshot2.png" alt="Backline app screenshot" />
    </div>

  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "backline-7e769.firebaseapp.com",
    projectId: "backline-7e769",
    storageBucket: "backline-7e769.firebasestorage.app",
    messagingSenderId: "1039412382496",
    appId: "1:1039412382496:web:6bdd4e410ef88361672545"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("waitlist-form");
  const emailInput = document.getElementById("email");
  const btn = document.getElementById("submit-btn");
  const meta = document.getElementById("meta");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    if (!email.includes("@")) return;

    try {
      btn.disabled = true;
      btn.textContent = "Joining...";

      await addDoc(collection(db, "waitlist"), {
        email,
        createdAt: serverTimestamp()
      });

      form.classList.add("submitted");

      emailInput.value = "you're in ✓";
      emailInput.disabled = true;

      btn.textContent = "Joined";

      meta.textContent = "You’re on the list · iOS beta coming soon";

    } catch (err) {
      console.error(err);
      alert("Failed to join waitlist. Please try again.");
      btn.disabled = false;
      btn.textContent = "Join waitlist";
    }
  });
</script>

  <footer class="footer">
  <div>© 2026 Backline</div>

  <div class="links">
    <a href="https://www.instagram.com/backlinenyc/" target="_blank">Instagram</a>
    <a href="mailto:deej@backlinenyc.com">Contact</a>
    <a href="/privacy.html">Privacy</a>
  </div>
</footer>

</body>
</html>
